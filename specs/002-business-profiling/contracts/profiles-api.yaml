openapi: 3.0.3
info:
  title: Business Profiling API
  description: API for business partner profiling and project recommendations (EPIC-006)
  version: 1.0.0

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: profiles
    description: Business profile management
  - name: recommendations
    description: Project recommendations

paths:
  /profiles/business:
    post:
      tags: [profiles]
      summary: Create or update business profile
      description: |
        Creates a new business profile or updates existing one for the current user+event.
        Triggers recommendation generation on success.
      operationId: upsertBusinessProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessProfileCreate'
      responses:
        '200':
          description: Profile created/updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessProfileResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [profiles]
      summary: Get current user's business profile
      operationId: getBusinessProfile
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: event_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessProfileResponse'
        '404':
          description: Profile not found

  /profiles/business/extract:
    post:
      tags: [profiles]
      summary: Extract structured profile from free text
      description: |
        Uses LLM to extract structured business criteria from free-text description.
        Returns extracted fields for user confirmation (does not save).
      operationId: extractProfileFromText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 2000
                  description: Free-text business description
                objective:
                  $ref: '#/components/schemas/BusinessObjective'
                  description: Optional hint for extraction
      responses:
        '200':
          description: Extraction successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractedProfile'
        '503':
          description: LLM service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profiles/business/{profile_id}/recommendations:
    get:
      tags: [recommendations]
      summary: Get recommendations for a profile
      operationId: getRecommendations
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        '200':
          description: Recommendations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsPage'
        '404':
          description: Profile not found

    post:
      tags: [recommendations]
      summary: Regenerate recommendations
      description: Clears existing recommendations and generates new ones based on current profile
      operationId: regenerateRecommendations
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Recommendations regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsPage'
        '503':
          description: Recommendation service unavailable

  /profiles/business/{profile_id}/recommendations/{recommendation_id}:
    patch:
      tags: [recommendations]
      summary: Update recommendation status
      description: Mark as viewed, bookmarked, etc.
      operationId: updateRecommendation
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: recommendation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_viewed:
                  type: boolean
                is_bookmarked:
                  type: boolean
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRecommendation'
        '404':
          description: Recommendation not found

components:
  schemas:
    BusinessObjective:
      type: string
      enum: [investment, hiring, technology, partnership]
      description: |
        - investment: Looking for projects to invest in
        - hiring: Looking to hire team members
        - technology: Looking for technology partners/solutions
        - partnership: Looking for strategic partnerships

    ProjectStage:
      type: string
      enum: [idea, mvp, early_traction, scaling, mature]

    BusinessProfileCreate:
      type: object
      required: [user_id, event_id, objective]
      properties:
        user_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        objective:
          $ref: '#/components/schemas/BusinessObjective'
        industries:
          type: array
          items:
            type: string
          maxItems: 10
        tech_stack:
          type: array
          items:
            type: string
          maxItems: 15
        project_stages:
          type: array
          items:
            $ref: '#/components/schemas/ProjectStage'
        collaboration_format:
          type: string
          maxLength: 500
        free_text_raw:
          type: string
          maxLength: 2000

    BusinessProfileResponse:
      allOf:
        - $ref: '#/components/schemas/BusinessProfileCreate'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            free_text_parsed:
              type: object
              additionalProperties: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            recommendations_count:
              type: integer
              description: Number of generated recommendations

    ExtractedProfile:
      type: object
      properties:
        objective:
          $ref: '#/components/schemas/BusinessObjective'
        industries:
          type: array
          items:
            type: string
        tech_stack:
          type: array
          items:
            type: string
        project_stages:
          type: array
          items:
            $ref: '#/components/schemas/ProjectStage'
        collaboration_format:
          type: string
        parsed_interests:
          type: array
          items:
            type: string
          description: Additional keywords extracted from text
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: LLM confidence in extraction quality

    ProjectRecommendation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        project_title:
          type: string
        project_description:
          type: string
        project_author:
          type: string
        project_tags:
          type: array
          items:
            type: string
        hall:
          type: string
        time_slot:
          type: string
        relevance_score:
          type: integer
          minimum: 0
          maximum: 100
        relevance_explanation:
          type: string
        rank:
          type: integer
        is_bookmarked:
          type: boolean
        is_viewed:
          type: boolean

    RecommendationsPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectRecommendation'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_next:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
