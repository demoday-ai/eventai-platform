openapi: "3.0.3"
info:
  title: "EPIC-004: Expert Assignment API"
  version: "1.0.0"
  description: |
    Endpoints for expert management, matching, invitations, and coverage dashboard.
    All endpoints require Bearer JWT authentication (from EPIC-001 auth).
    Organizer-only endpoints check organizer_telegram_ids.

servers:
  - url: /api/v1
    description: Backend API

paths:
  /experts/upload:
    post:
      summary: Upload expert list (CSV/JSON)
      description: |
        Organizer uploads a new expert list. Replaces existing seed data.
        File must contain: id, name, telegram, expertise_tags.
        If experts already exist for this event, returns confirmation request.
      tags: [Experts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or JSON file with expert data
                confirm_replace:
                  type: boolean
                  default: false
                  description: If true, replace existing experts
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpertUploadResult"
        "409":
          description: Experts already exist, confirmation needed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceConfirmation"
        "403":
          description: Not an organizer

  /experts:
    get:
      summary: List experts
      description: Get all experts for current event, optionally filtered.
      tags: [Experts]
      security:
        - bearerAuth: []
      parameters:
        - name: has_tags
          in: query
          schema:
            type: boolean
          description: Filter by whether expert has tags assigned
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by specific tag name
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or telegram
      responses:
        "200":
          description: Expert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpertResponse"

  /experts/{expert_id}:
    get:
      summary: Get expert details
      tags: [Experts]
      security:
        - bearerAuth: []
      parameters:
        - name: expert_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Expert details with tags and assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpertDetailResponse"
        "404":
          description: Expert not found

  /matching/run:
    post:
      summary: Run expert-room matching
      description: |
        Runs weighted tag-overlap matching against approved clustering.
        Requires an approved clustering run. Returns proposed assignments.
      tags: [Matching]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchingRequest"
      responses:
        "200":
          description: Matching result with proposed assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchingResult"
        "409":
          description: No approved clustering exists
        "403":
          description: Not an organizer

  /matching/current:
    get:
      summary: Get current matching result
      description: Returns the latest matching assignments for the approved clustering.
      tags: [Matching]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current matching assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchingResult"
        "404":
          description: No matching exists

  /matching/{assignment_id}/move:
    post:
      summary: Move expert to different room
      description: Organizer manually moves an expert to another room.
      tags: [Matching]
      security:
        - bearerAuth: []
      parameters:
        - name: assignment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveExpertRequest"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentResponse"
        "404":
          description: Assignment not found

  /matching/approve:
    post:
      summary: Approve current matching
      description: |
        Organizer approves the current expert distribution.
        Changes all assignment statuses from 'proposed' to 'approved'.
      tags: [Matching]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Approval confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveResult"
        "404":
          description: No matching to approve

  /invites/preview:
    get:
      summary: Preview invite sending
      description: |
        Shows preview of invite campaign: how many experts, sample message,
        how many have bot access vs not.
      tags: [Invites]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitePreview"

  /invites/confirm:
    post:
      summary: Confirm invite sending
      description: |
        Marks all approved assignments as 'invite_ready'.
        Returns bot link for organizer to share with expert group.
      tags: [Invites]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invites confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteConfirmResult"

  /coverage:
    get:
      summary: Get coverage dashboard
      description: |
        Returns per-room expert coverage stats: confirmed, declined,
        no response, with coverage level indicator.
      tags: [Coverage]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Coverage dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageDashboard"

  /coverage/{room_id}:
    get:
      summary: Get room coverage details
      description: List of experts assigned to a specific room with their statuses.
      tags: [Coverage]
      security:
        - bearerAuth: []
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Room expert details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomCoverageDetail"

  /escalations:
    get:
      summary: Get active escalations
      description: List of unresolved escalations for organizer action.
      tags: [Escalations]
      security:
        - bearerAuth: []
      parameters:
        - name: resolved
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Escalation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EscalationResponse"

  /escalations/{escalation_id}/resolve:
    post:
      summary: Resolve an escalation
      tags: [Escalations]
      security:
        - bearerAuth: []
      parameters:
        - name: escalation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Escalation resolved

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ExpertUploadResult:
      type: object
      properties:
        total_parsed:
          type: integer
        imported:
          type: integer
        with_tags:
          type: integer
        without_tags:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              field:
                type: string
              message:
                type: string

    ReplaceConfirmation:
      type: object
      properties:
        existing_count:
          type: integer
        message:
          type: string

    ExpertResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        seed_id:
          type: string
        name:
          type: string
        telegram_username:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        bot_started:
          type: boolean
        assignment_status:
          type: string
          nullable: true

    ExpertDetailResponse:
      allOf:
        - $ref: "#/components/schemas/ExpertResponse"
        - type: object
          properties:
            inviter:
              type: string
              nullable: true
            dd_status_seed:
              type: string
              nullable: true
            assignment:
              $ref: "#/components/schemas/AssignmentResponse"

    MatchingRequest:
      type: object
      properties:
        use_adjacent_tags:
          type: boolean
          default: true
          description: Whether to use LLM for adjacent tag resolution

    MatchingResult:
      type: object
      properties:
        clustering_run_id:
          type: string
          format: uuid
        total_experts:
          type: integer
        matched_experts:
          type: integer
        unmatched_experts:
          type: integer
          description: Experts without tags
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/RoomMatchSummary"

    RoomMatchSummary:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        expert_count:
          type: integer
        experts:
          type: array
          items:
            type: object
            properties:
              expert_id:
                type: string
                format: uuid
              name:
                type: string
              match_score:
                type: number
              matching_tags:
                type: array
                items:
                  type: string
              is_manual:
                type: boolean

    AssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expert_id:
          type: string
          format: uuid
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        match_score:
          type: number
        is_manual:
          type: boolean
        status:
          type: string
          enum: [proposed, approved, invite_ready, invited, confirmed, declined, reassign_requested, no_show]

    MoveExpertRequest:
      type: object
      required: [target_room_id]
      properties:
        target_room_id:
          type: string
          format: uuid

    ApproveResult:
      type: object
      properties:
        approved_count:
          type: integer
        message:
          type: string

    InvitePreview:
      type: object
      properties:
        total_experts:
          type: integer
        with_telegram:
          type: integer
        without_telegram:
          type: integer
        sample_message:
          type: string
        bot_link:
          type: string

    InviteConfirmResult:
      type: object
      properties:
        invite_ready_count:
          type: integer
        bot_link:
          type: string
          description: "t.me/botname?start=expert"
        message:
          type: string

    CoverageDashboard:
      type: object
      properties:
        event_date:
          type: string
          format: date
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/RoomCoverageSummary"
        totals:
          type: object
          properties:
            total_needed:
              type: integer
            confirmed:
              type: integer
            declined:
              type: integer
            no_response:
              type: integer
            coverage_percent:
              type: number

    RoomCoverageSummary:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        needed:
          type: integer
          description: Always 2
        confirmed:
          type: integer
        declined:
          type: integer
        no_response:
          type: integer
        not_in_bot:
          type: integer
          description: Experts who haven't started bot
        coverage_level:
          type: string
          enum: [covered, partial, uncovered]

    RoomCoverageDetail:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        experts:
          type: array
          items:
            type: object
            properties:
              expert_id:
                type: string
                format: uuid
              name:
                type: string
              status:
                type: string
              match_score:
                type: number
              is_manual:
                type: boolean
              bot_started:
                type: boolean
        suggested_adjacent:
          type: array
          items:
            type: object
            properties:
              expert_id:
                type: string
                format: uuid
              name:
                type: string
              adjacent_tags:
                type: array
                items:
                  type: string
          description: Experts with adjacent tags (not yet assigned here)

    EscalationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        expert_name:
          type: string
        room_name:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time
        resolved:
          type: boolean
