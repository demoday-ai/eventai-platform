openapi: "3.0.3"
info:
  title: "EPIC-003: Student Schedule Acknowledgment API"
  version: "0.2.0"
  description: "Endpoints for student schedule acknowledgment (participation is mandatory)"

paths:
  /api/v1/participation/broadcast:
    post:
      summary: "Запустить рассылку слотов студентам"
      description: "Создаёт ParticipationRequest для каждого проекта в утверждённом расписании и рассылает сообщения через Telegram. Идемпотентна: при повторном вызове отправляет только новые/изменённые слоты."
      tags: [Participation]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Рассылка завершена"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"
        "403":
          description: "Только для организаторов"
        "409":
          description: "Нет утверждённого расписания"

  /api/v1/participation/summary:
    get:
      summary: "Сводка ознакомлений"
      description: "Возвращает количество ознакомившихся, неответивших, неподключённых с разбивкой по залам."
      tags: [Participation]
      security:
        - bearerAuth: []
      parameters:
        - name: room_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: "Фильтр по залу"
      responses:
        "200":
          description: "Сводка"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipationSummary"
        "403":
          description: "Только для организаторов"

  /api/v1/participation/unacknowledged:
    get:
      summary: "Список неознакомленных студентов"
      description: "Возвращает список студентов, не нажавших 'Ознакомлен'."
      tags: [Participation]
      security:
        - bearerAuth: []
      parameters:
        - name: room_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: "Фильтр по залу"
      responses:
        "200":
          description: "Список неознакомленных"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UnacknowledgedStudent"
                  total:
                    type: integer
        "403":
          description: "Только для организаторов"

  /api/v1/participation/{request_id}:
    get:
      summary: "Детали запроса на ознакомление"
      tags: [Participation]
      security:
        - bearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Детали"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipationRequestDetail"
        "404":
          description: "Запрос не найден"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BroadcastResult:
      type: object
      required: [sent, skipped, failed, unregistered]
      properties:
        sent:
          type: integer
          description: "Количество отправленных сообщений"
        skipped:
          type: integer
          description: "Пропущено (слот не изменился)"
        failed:
          type: integer
          description: "Ошибки доставки (бот заблокирован и т.д.)"
        unregistered:
          type: integer
          description: "Студенты без Telegram-контакта в системе"
        unregistered_projects:
          type: array
          items:
            type: object
            properties:
              project_title:
                type: string
              telegram_contact:
                type: string

    ParticipationSummary:
      type: object
      required: [total, acknowledged, pending, unregistered]
      properties:
        total:
          type: integer
          description: "Всего проектов в расписании"
        acknowledged:
          type: integer
          description: "Нажали Ознакомлен"
        pending:
          type: integer
          description: "Не ответили (сообщение отправлено)"
        unregistered:
          type: integer
          description: "Не зарегистрированы в боте"
        by_room:
          type: array
          items:
            type: object
            properties:
              room_id:
                type: string
                format: uuid
              room_name:
                type: string
              total:
                type: integer
              acknowledged:
                type: integer
              pending:
                type: integer

    UnacknowledgedStudent:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        project_title:
          type: string
        author_name:
          type: string
        telegram_contact:
          type: string
        room_name:
          type: string
        status:
          type: string
          enum: [pending, sent]
        sent_at:
          type: string
          format: date-time
        reminder_sent:
          type: boolean
        escalated:
          type: boolean

    ParticipationRequestDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_title:
          type: string
        author_name:
          type: string
        room_name:
          type: string
        status:
          type: string
          enum: [pending, sent, acknowledged]
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        reminder_sent_at:
          type: string
          format: date-time
          nullable: true
        escalated_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
