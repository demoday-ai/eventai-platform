# Guest Profiling API Contracts (EPIC-005)
# OpenAPI 3.0 style - REST endpoints for guest profiling and recommendations

openapi: "3.0.3"
info:
  title: Guest Profiling API
  version: "1.0.0"
  description: |
    API для профилирования гостей и генерации персональных программ.
    Все endpoints доступны ролям Guest и Business.

paths:

  /api/v1/profile:
    get:
      summary: Получить профиль интересов текущего гостя
      description: Возвращает профиль интересов для текущего события. 404 если профиль не создан.
      tags: [Profile]
      security: [BearerAuth: [guest, business]]
      responses:
        200:
          description: Профиль найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestProfileResponse'
        404:
          description: Профиль не найден

    post:
      summary: Создать или обновить профиль интересов
      description: |
        Создаёт профиль интересов. Если профиль уже существует — обновляет.
        При наличии raw_text — AI извлекает теги и ключевые слова.
        При недоступности AI — используются только selected_tags.
      tags: [Profile]
      security: [BearerAuth: [guest, business]]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCreateRequest'
      responses:
        200:
          description: Профиль создан/обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestProfileResponse'

  /api/v1/profile/tags:
    get:
      summary: Список доступных тегов для профилирования
      description: Возвращает все теги из проектов текущего события с количеством проектов.
      tags: [Profile]
      security: [BearerAuth: [guest, business]]
      responses:
        200:
          description: Список тегов
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/TagInfo'

  /api/v1/recommendations:
    get:
      summary: Получить персональную подборку проектов
      description: Возвращает подборку проектов для текущего профиля. 404 если не сгенерирована.
      tags: [Recommendations]
      security: [BearerAuth: [guest, business]]
      responses:
        200:
          description: Подборка проектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsResponse'
        404:
          description: Подборка не найдена (профиль не создан или подборка не сгенерирована)

    post:
      summary: Сгенерировать персональную подборку
      description: |
        Генерирует подборку из 10-15 проектов на основе профиля гостя.
        Алгоритм: IDF tag overlap → LLM re-ranking top-20 → LLM summaries.
        При недоступности LLM: только tag overlap, без summaries.
        Перезаписывает предыдущую подборку.
      tags: [Recommendations]
      security: [BearerAuth: [guest, business]]
      responses:
        200:
          description: Подборка сгенерирована
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsResponse'
        400:
          description: Профиль не создан — нужно сначала POST /profile

  /api/v1/recommendations/{project_id}:
    get:
      summary: Детали проекта из подборки
      description: Полное описание проекта с тегами, автором, залом.
      tags: [Recommendations]
      security: [BearerAuth: [guest, business]]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Детали проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailResponse'
        404:
          description: Проект не найден в подборке

components:
  schemas:

    ProfileCreateRequest:
      type: object
      properties:
        selected_tags:
          type: array
          items:
            type: string
          description: Теги выбранные кнопками
          example: ["NLP", "FinTech"]
        raw_text:
          type: string
          nullable: true
          description: Свободный текст от гостя
          example: "Интересует антифрод в финтехе и hiring automation"
      required: [selected_tags]

    GuestProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        selected_tags:
          type: array
          items:
            type: string
        extracted_tags:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
        raw_text:
          type: string
          nullable: true
        all_interests:
          type: array
          items:
            type: string
          description: Объединение selected_tags + extracted_tags (дедупликация)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TagInfo:
      type: object
      properties:
        name:
          type: string
        project_count:
          type: integer
          description: Количество проектов с этим тегом
      example:
        name: "NLP"
        project_count: 52

    RecommendationsResponse:
      type: object
      properties:
        profile_id:
          type: string
          format: uuid
        total:
          type: integer
          description: Общее количество проектов в подборке
        must_visit:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'
          description: Top-5 проектов
        if_time:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'
          description: Остальные проекты

    RecommendationItem:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        rank:
          type: integer
        title:
          type: string
        summary:
          type: string
          description: AI-сгенерированное краткое описание (2-3 предложения) или fallback из описания
        tags:
          type: array
          items:
            type: string
        author:
          type: string
        room_name:
          type: string
          nullable: true
        room_number:
          type: integer
          nullable: true
        relevance_score:
          type: number
          format: float
        conflict_rooms:
          type: array
          items:
            type: integer
          description: Номера залов с конфликтующими проектами в подборке

    ProjectDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          description: Полное описание проекта
        author:
          type: string
        telegram_contact:
          type: string
        tags:
          type: array
          items:
            type: string
        room_name:
          type: string
          nullable: true
        room_number:
          type: integer
          nullable: true
        relevance_score:
          type: number
          format: float
        llm_summary:
          type: string
          nullable: true

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
