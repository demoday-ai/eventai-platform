openapi: "3.0.3"
info:
  title: "EPIC-006 Coverage Dashboard API"
  version: "1.0.0"
  description: "Organizer coverage dashboard — extends existing /coverage endpoints"

paths:
  /api/v1/coverage:
    get:
      summary: "Coverage summary by room (enriched)"
      description: |
        Returns per-room coverage summary with project counts, top tags,
        expert counts by status, and coverage level indicator.
        Extends existing endpoint with project_count and top_tags fields.
      operationId: getCoverageSummary
      tags: [Coverage]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Coverage summary"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageSummary"
        "403":
          description: "Not an organizer"
        "404":
          description: "No approved clustering"

  /api/v1/coverage/{room_id}:
    get:
      summary: "Room detail with experts, tags, and gap analysis"
      description: |
        Returns detailed room information: expert list with statuses/tags,
        project tags, uncovered tags (gaps), and candidate experts.
      operationId: getRoomCoverageDetail
      tags: [Coverage]
      security:
        - bearerAuth: []
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Room coverage detail"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomCoverageDetail"
        "403":
          description: "Not an organizer"
        "404":
          description: "Room not found"

  /api/v1/coverage/gaps:
    get:
      summary: "All coverage gaps across rooms"
      description: |
        Returns list of uncovered tags per room with candidate experts.
        Only rooms with gaps are included.
      operationId: getCoverageGaps
      tags: [Coverage]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Coverage gaps"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageGapsList"
        "403":
          description: "Not an organizer"
        "404":
          description: "No approved clustering"

components:
  schemas:
    RoomCoverage:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        project_count:
          type: integer
          description: "Number of projects in this room"
        top_tags:
          type: array
          items:
            type: string
          description: "Top 5 project tags by frequency"
        confirmed:
          type: integer
          description: "Experts with status=confirmed"
        pending:
          type: integer
          description: "Experts with status in (proposed,approved,invite_ready,invited)"
        declined:
          type: integer
        total_assigned:
          type: integer
        coverage_level:
          type: string
          enum: [covered, partial, uncovered]

    CoverageSummary:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/RoomCoverage"
        totals:
          type: object
          properties:
            confirmed:
              type: integer
            pending:
              type: integer
            declined:
              type: integer
            total_needed:
              type: integer
            coverage_percent:
              type: number

    RoomExpert:
      type: object
      properties:
        expert_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        match_score:
          type: number
        tags:
          type: array
          items:
            type: string
        bot_started:
          type: boolean

    ExpertCandidate:
      type: object
      properties:
        expert_id:
          type: string
          format: uuid
        name:
          type: string
        matching_tags:
          type: array
          items:
            type: string
        current_rooms:
          type: array
          items:
            type: string
          description: "Room names where expert is currently assigned"

    CoverageGap:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        uncovered_tag:
          type: string
        project_count_with_tag:
          type: integer
          description: "Number of projects in room with this tag"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/ExpertCandidate"

    RoomCoverageDetail:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_name:
          type: string
        project_count:
          type: integer
        project_tags:
          type: array
          items:
            type: string
          description: "All distinct project tags in room"
        experts:
          type: array
          items:
            $ref: "#/components/schemas/RoomExpert"
        uncovered_tags:
          type: array
          items:
            type: string
          description: "Project tags with no confirmed expert match"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/ExpertCandidate"
          description: "Experts recommended for uncovered tags"

    CoverageGapsList:
      type: object
      properties:
        total_gaps:
          type: integer
        gaps:
          type: array
          items:
            $ref: "#/components/schemas/CoverageGap"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
