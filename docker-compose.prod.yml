services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demoday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demoday}
      POSTGRES_DB: ${POSTGRES_DB:-demoday}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demoday}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-demoday}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-demoday}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # RabbitMQ Management UI at /rabbitmq/
      - "traefik.http.routers.rabbitmq.rule=Host(`${DOMAIN:-team12.camp.aitalenthub.ru}`) && PathPrefix(`/rabbitmq`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls=true"
      - "traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rabbitmq.middlewares=rabbitmq-stripprefix"
      - "traefik.http.middlewares.rabbitmq-stripprefix.stripprefix.prefixes=/rabbitmq"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Celery Flower - worker monitoring
  flower:
    image: mher/flower:2.0
    command: celery --broker=amqp://${RABBITMQ_USER:-demoday}:${RABBITMQ_PASS:-demoday}@rabbitmq:5672// flower --url_prefix=/flower
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-demoday}:${RABBITMQ_PASS:-demoday}@rabbitmq:5672//
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-demoday}:${FLOWER_PASS:-demoday}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Flower UI at /flower/
      - "traefik.http.routers.flower.rule=Host(`${DOMAIN:-team12.camp.aitalenthub.ru}`) && PathPrefix(`/flower`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls=true"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-demoday}:${RABBITMQ_PASS:-demoday}@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  worker:
    build: ./backend
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --hostname=worker-default@%h
      --queues=default
      --concurrency=2
      --max-tasks-per-child=50
    env_file: ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-demoday}:${RABBITMQ_PASS:-demoday}@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  worker-heavy:
    build: ./backend
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --hostname=worker-heavy@%h
      --queues=heavy
      --concurrency=1
      --max-tasks-per-child=20
    env_file: ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-demoday}:${RABBITMQ_PASS:-demoday}@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_APP_NAME: ${VITE_APP_NAME:-Demo Day Admin}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # HTTP router
      - "traefik.http.routers.demoday-frontend.rule=Host(`${DOMAIN:-team12.camp.aitalenthub.ru}`)"
      - "traefik.http.routers.demoday-frontend.entrypoints=websecure"
      - "traefik.http.routers.demoday-frontend.tls=true"
      - "traefik.http.routers.demoday-frontend.tls.certresolver=letsencrypt"

      # Service
      - "traefik.http.services.demoday-frontend.loadbalancer.server.port=80"

      # Health check
      - "traefik.http.services.demoday-frontend.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.demoday-frontend.loadbalancer.healthcheck.interval=30s"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  pgdata:
  redis_data:
  rabbitmq_data:
  qdrant_data:
