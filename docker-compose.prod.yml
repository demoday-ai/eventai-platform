services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demoday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demoday}
      POSTGRES_DB: ${POSTGRES_DB:-demoday}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demoday}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_APP_NAME: ${VITE_APP_NAME:-Demo Day Admin}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # HTTP router
      - "traefik.http.routers.demoday-frontend.rule=Host(`${DOMAIN:-team12.camp.aitalenthub.ru}`)"
      - "traefik.http.routers.demoday-frontend.entrypoints=websecure"
      - "traefik.http.routers.demoday-frontend.tls=true"
      - "traefik.http.routers.demoday-frontend.tls.certresolver=letsencrypt"

      # Service
      - "traefik.http.services.demoday-frontend.loadbalancer.server.port=80"

      # Health check
      - "traefik.http.services.demoday-frontend.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.demoday-frontend.loadbalancer.healthcheck.interval=30s"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  pgdata:
