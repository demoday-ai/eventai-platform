<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0abfc"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Stylized "E" representing Event -->
  <g transform="translate(100, 120)">
    <!-- Main E shape -->
    <path d="M60 0 L260 0 L260 40 L110 40 L110 116 L240 116 L240 156 L110 156 L110 232 L260 232 L260 272 L60 272 Z" fill="white"/>

    <!-- AI sparkle dots -->
    <circle cx="280" cy="20" r="12" fill="url(#accent)"/>
    <circle cx="300" cy="60" r="8" fill="url(#accent)" opacity="0.8"/>
    <circle cx="270" cy="90" r="6" fill="url(#accent)" opacity="0.6"/>
  </g>

  <!-- Subtle circuit lines representing AI -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none">
    <path d="M80 400 Q150 380 200 400"/>
    <path d="M312 400 Q362 380 432 400"/>
    <circle cx="200" cy="400" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="312" cy="400" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>
</svg>
