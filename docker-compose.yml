services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demoday
      POSTGRES_PASSWORD: demoday
      POSTGRES_DB: demoday
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demoday"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    expose:
      - "8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_APP_NAME: Demo Day Admin
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
