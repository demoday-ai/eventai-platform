services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demoday
      POSTGRES_PASSWORD: demoday
      POSTGRES_DB: demoday
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demoday"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: demoday
      RABBITMQ_DEFAULT_PASS: demoday
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    expose:
      - "8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://demoday:demoday@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_APP_NAME: Demo Day Admin
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data:
  rabbitmq_data:
