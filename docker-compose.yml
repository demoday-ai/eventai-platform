services:
  db:
    # 031-bot-replacement: pgvector required for bot agent embeddings (3072d Gemini).
    # Same PG 16 base — pgdata volume is forward/backward compatible.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: demoday
      POSTGRES_PASSWORD: demoday
      POSTGRES_DB: demoday
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demoday"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: demoday
      RABBITMQ_DEFAULT_PASS: demoday
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    expose:
      - "8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build: ./backend
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
      --queues=default,heavy
    env_file: ./backend/.env
    environment:
      - RABBITMQ_URL=amqp://demoday:demoday@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data:ro

  flower:
    image: mher/flower:2.0
    command: celery --broker=amqp://demoday:demoday@rabbitmq:5672// flower --port=5555 --url_prefix=flower
    depends_on:
      rabbitmq:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_APP_NAME: Demo Day Admin
    ports:
      - "3000:80"
    depends_on:
      - backend
      - flower

  # 031-bot-replacement: standalone aiogram bot service.
  # Owns the Telegram long-poll for the shared bot token.
  # Backend (scheduler/messaging/support) sends outbound messages via send-only
  # aiogram.Bot from app.services.core.bot_messenger — no HTTP bridge needed.
  bot:
    build: ./bot
    env_file: ./bot/.env
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # CLI test harness for the bot — same image, idle by default.
  # Drive via `scripts/botchat.sh <session> <message>`.
  botcli:
    image: demoday-core-bot
    command: ["sleep", "infinity"]
    env_file: ./bot/.env
    depends_on:
      bot:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  rabbitmq_data:
  qdrant_data:
